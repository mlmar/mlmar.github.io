name: Build Astro Output

on:
    push:
        branches: [astro]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - run: npm run build

            - name: Publish build to branch
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: dist
                  publish_branch: build-astro
                  force_orphan: true
